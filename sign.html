<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Registration</title>
  <link rel="stylesheet" href="sign.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
 <header class="navbar">
    <h2 class="logo">CloudtopG</h2>
    <p class="signup">New User? <span>Sign Up</span></p>
  </header>
<div class="container" style="margin-top: -2opx;">

  <!-- Left Image Section -->
  <div class="image-section">
    <img src="https://cloudtopg.netlify.app/assets/login_pic-ju_59Ozl.png" alt="Illustration">
  </div>

  <!-- Right Form Section -->
  <div class="form-section">
    <h2>User registration</h2>

    <form>
      <div class="input-box">
        <input type="text" placeholder="Fullname" required>
      </div>

      <div class="input-box">
        <input type="email" placeholder="Email" required>
      </div>

      <div class="input-box">
        <input type="password" placeholder="Password" required>
      </div>

      <div class="actions">
        <button type="submit">Sign up</button>
        <p>Existing user? <a href="#">Login</a></p>
      </div>
    </form>

  </div>

</div>
<div >
<div class="icons">
  <h3>Sign up with</h3>
  <a href="#" class="icon google" style="margin-right: 2rem;"><i class="fab fa-google"></i></a>
  <a href="#" class="icon facebook" style="margin-right: 2rem;"><i class="fab fa-facebook-f"></i></a>
  <a href="#" class="icon twitter" style="margin-right: 2rem;"><i class="fab fa-twitter"></i></a>
</div>

</div>
</body>
</html>
