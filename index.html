<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <header class="navbar">
    <h2 class="logo">CloudtopG</h2>
    <p class="signup">New User? <span>Sign Up</span></p>
  </header>

  <section class="container">

    <!-- Left Illustration -->
    <div class="left">
      <img src="https://cloudtopg.netlify.app/assets/login_pic-ju_59Ozl.png" alt="illustration">
    </div>

    <!-- Right Form -->
    <div class="right">
      <h1>Welcome Back!</h1>
      <p>Login to continue</p>

      <form>
        <div class="input-box">
          <span>📧</span>
          <input type="email" placeholder="Email">
        </div>

        <div class="input-box">
          <span>🔒</span>
          <input type="password" placeholder="Password">
        </div>

        <div class="actions">
          <button type="submit">Login</button>
          <a href="#">Forget Password?</a>
        </div>
      </form>
    </div>
      
  </section>
   
<div>
<div class="icons">
  <h3>LOGIN with</h3>
  <a href="#" class="icon google" style="margin-right: 2rem;"><i class="fab fa-google"></i></a>
  <a href="#" class="icon facebook" style="margin-right: 2rem;"><i class="fab fa-facebook-f"></i></a>
  <a href="#" class="icon twitter" style="margin-right: 2rem;"><i class="fab fa-twitter"></i></a>
</div>

</div>

<!-- Landing Page -->
<div class="container" id="landingPage" style="display:none; text-align:center;">
  <h1>Welcome to CloudtopG 🎉</h1>
  <p>You have successfully logged in.</p>
  <button onclick="logout()">Logout</button>
</div>

<script>
// Login details
const validEmail = "admin@gmail.com";
const validPassword = "1234";

// Handle form submit
document.querySelector("form").addEventListener("submit", function(e) {
  e.preventDefault(); // stop page refresh

  const email = document.querySelector("input[type='email']").value;
  const password = document.querySelector("input[type='password']").value;

  if (email === validEmail && password === validPassword) {
    document.querySelector(".container").style.display = "none"; // hide login
    document.getElementById("landingPage").style.display = "block"; // show landing
  } else {
    alert("Invalid email or password!");
  }
});

// Logout function
function logout() {
  document.getElementById("landingPage").style.display = "none";
  document.querySelector(".container").style.display = "flex";
}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Registration</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

  <!-- Left Image Section -->
  <div class="image-section">
    <img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png" alt="Illustration">
  </div>

  <!-- Right Form Section -->
  <div class="form-section">
    <h2>User registration</h2>

    <form>
      <div class="input-box">
        <input type="text" placeholder="Fullname" required>
      </div>

      <div class="input-box">
        <input type="email" placeholder="Email" required>
      </div>

      <div class="input-box">
        <input type="password" placeholder="Password" required>
      </div>

      <div class="actions">
        <button type="submit">Sign up</button>
        <p>Existing user? <a href="#">Login</a></p>
      </div>
    </form>

  </div>

</div>

</body>
/* Reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

/* Container */
.container {
  display: flex;
  height: 100vh;
}

/* Left Image */
.image-section {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #f5f5f5;
}

.image-section img {
  width: 80%;
  max-width: 400px;
}

/* Right Form */
.form-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 2rem;
}

.form-section h2 {
  text-align: center;
  margin-bottom: 2rem;
}

/* Inputs */
.input-box {
  margin-bottom: 1.5rem;
}

.input-box input {
  width: 100%;
  padding: 12px;
  border: 2px solid #333;
  outline: none;
  font-size: 16px;
}

/* Actions */
.actions {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.actions button {
  padding: 10px 25px;
  border: none;
  border-radius: 25px;
  background: linear-gradient(to right, #6a11cb, #2575fc);
  color: white;
  cursor: pointer;
}

.actions p {
  font-size: 14px;
}

.actions a {
  text-decoration: none;
  color: #333;
}

/* 📱 Mobile */
@media (max-width: 768px) {
  .container {
    flex-direction: column;
  }

  .image-section {
    display: none;
  }

  .form-section {
    width: 100%;
    padding: 1.5rem;
  }

  .actions {
    flex-direction: column;
    align-items: flex-start;
  }
}

/* 📲 Tablet */
@media (min-width: 769px) and (max-width: 1024px) {
  .container {
    flex-direction: row;
  }

  .image-section img {
    width: 90%;
  }

  .form-section {
    padding: 1.5rem;
  }
}
</html>
</script>
</body>
</html>
